name: Build Phone APK (Release)

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-phone:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vz-pixelmusic.jks

      - name: Create keystore.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build Phone release APK
        run: gradle :app:assembleRelease -Ppixelmusic.enableAbiSplits=true

      - name: Verify Phone split APKs
        run: |
          BUILD_TOOLS_VERSION="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          for apk in \
            app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          do
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2" dump badging "$apk" >/dev/null
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner" verify --verbose "$apk"
          done

      - name: Upload Phone split APK artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: PixelMusic-phone-release-split-apks
          path: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          if-no-files-found: error
          compression-level: 0

      - name: Generate Changelog
        id: changelog
        env:
          PREV_SHA: ${{ github.event.before }}
          CURR_SHA: ${{ github.sha }}
        run: |
          python3 -c "
          import subprocess
          import html
          import os

          prev_sha = os.environ.get('PREV_SHA', '')
          curr_sha = os.environ.get('CURR_SHA', '')

          if prev_sha and prev_sha != '0000000000000000000000000000000000000000':
              cmd = ['git', 'log', '--pretty=format:%s', f'{prev_sha}..{curr_sha}']
          else:
              cmd = ['git', 'log', '-n', '5', '--pretty=format:%s']

          try:
              output = subprocess.check_output(cmd).decode('utf-8', errors='ignore')
              commits = [line.strip() for line in output.split('\n') if line.strip()]
          except Exception as e:
              commits = ['New release build']

          changelog = ''
          for c in commits:
              escaped = html.escape(c)
              changelog += f'<blockquote>{escaped}</blockquote>\n'

          if not changelog:
              changelog = '<blockquote>New release build</blockquote>'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('changelog<<EOF\n' + changelog + 'EOF\n')
          "

      - name: Publish Release to Telegram Channel
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "@PixelMusicApp"
          TELEGRAM_THREAD_ID: "2"
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set, skipping publishing."
            exit 0
          fi

          BUILD_TOOLS_VERSION="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          VERSION_NAME=$("$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2" dump badging app/build/outputs/apk/release/app-arm64-v8a-release.apk | grep versionName | sed -E "s/.*versionName='([^']*)'.*/\1/")

          CAPTION="<b>📱 PixelMusic Phone Release</b>

          <b>Version:</b> <code>${VERSION_NAME}</code>
          <b>Commit:</b> <a href=\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\">${{ github.sha }}</a>

          <b>Changes:</b>
          ${CHANGELOG}

          🚀 New release build is ready! See attached split APKs below."

          THREAD_ARGS=""
          if [ -n "$TELEGRAM_THREAD_ID" ]; then
            THREAD_ARGS="--form-string message_thread_id=${TELEGRAM_THREAD_ID}"
          fi

          curl -F document=@app/build/outputs/apk/release/app-armeabi-v7a-release.apk \
               --form-string chat_id="${TELEGRAM_CHAT_ID}" \
               $THREAD_ARGS \
               --form-string parse_mode="HTML" \
               --form-string caption="${CAPTION}" \
               "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"

          curl -F document=@app/build/outputs/apk/release/app-arm64-v8a-release.apk \
               --form-string chat_id="${TELEGRAM_CHAT_ID}" \
               $THREAD_ARGS \
               --form-string parse_mode="HTML" \
               --form-string caption="PixelMusic Release Build (arm64-v8a) 🚀" \
               "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
